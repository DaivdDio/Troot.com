<script>
    document.addEventListener('submit', async function(e) {

        // ADD JOB
        if (e.target.id === 'addJobForm') {
            e.preventDefault();

            const form = e.target;
            const button = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');

            button.disabled = true;
            button.textContent = 'Uploading...';

            status.innerHTML = `
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Uploading image...
            `;

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                const data = await response.json();

                if (data.success) {

                    status.innerHTML = `
                        <div class="alert alert-success py-2 mb-0">
                            Job uploaded successfully.
                        </div>
                    `;

                    form.reset();

                    setTimeout(() => {
                        location.reload();
                    }, 800);

                } else {

                    status.innerHTML = `
                        <div class="alert alert-danger py-2 mb-0">
                            ${data.error || 'Failed to upload job'}
                        </div>
                    `;

                    button.disabled = false;
                    button.textContent = 'Upload';
                }

            } catch (err) {

                status.innerHTML = `
                    <div class="alert alert-danger py-2 mb-0">
                        Upload failed.
                    </div>
                `;

                button.disabled = false;
                button.textContent = 'Upload';
            }

            return;
        }

        // DELETE JOB
        if (e.target.classList.contains('delete-job-form')) {
            e.preventDefault();

            if (!confirm('Are you sure you want to delete this job?')) {
                return;
            }

            const form = e.target;

            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            const data = await response.json();

            if (data.success) {
                location.reload();
            } else {
                alert('Failed to delete job.');
            }
        }

        // EDIT JOB
        if (e.target.classList.contains('editJobForm')) {

            e.preventDefault();

            if (!confirm('Are you sure you want to save these changes?')) {
                return;
            }

            const form = e.target;

            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            const data = await response.json();

            if (data.success) {

                // Remove edit query parameter and close form
                const url = new URL(window.location);

                url.searchParams.delete('edit');
                url.searchParams.set('view', 'grid');

                // keep pagination
                /*if (!url.searchParams.get('page')) {
                    url.searchParams.set('page', '{{ jobs.number }}');
                }*/

                window.location.href = url.toString();

            } else {
                alert('Failed to update job.');
            }

            return;
        }

        //------------------------------------------------------------------------------------------------------------
    });      
</script>
